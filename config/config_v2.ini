[Camera]
HideBallMode=false
; Onboard (RACOON-Pi) camera frame size in pixels. The ball is projected into
; this frame and reported to RAVEN as center-origin (x right, y up) coordinates
; in PiToMw. Match RACOON-Pi's capture resolution (Rock5A default 640x480).
OnboardFrameWidth=640
OnboardFrameHeight=480

[Display]
ForceDebugDrawMode=false
NumThreads=4
height=700
width=1101

[Geometery]
FieldLength=15400
FieldWidth=12400
GoalDepth=1800
GoalWidth=3600
LineThickness=50
PenaltyAreaDepth=3000
PenaltyAreaWidth=6000
RadiusCenterCircle=3000
RadiusCornerArc=500
RadiusPenaltyArc=1000

[LightMode]
BlueRobot=false
Field=false
Stadium=false
YellowRobot=false

[Network]
blueTeamControlPort=10301
commandListenPort=20694
visionMulticastAddress=224.5.23.2
visionMulticastPort=10694
yellowTeamControlPort=10302

[Physics]
AccBrakeAbsoluteMax=5000
AccBrakeAngularMax=100
AccSpeedupAbsoluteMax=5000
AccSpeedupAngularMax=100
BallRestitution=0.41
CCD=true
DesiredFps=60
Gravity=9.8
KickerFriction=0.99
MaxChipKickSpeed=10
MaxLinearKickSpeed=10
RollingFriction=1
VelAbsoluteMax=5000
VelAngularMax=20

[Robot]
blueRobotCount=11
yellowRobotCount=3

[Encoder]
; Synthetic wheel-encoder feedback emitted to RAVEN as PiToMw (multicast).
; Geometry must match RAVEN system_model encoder.* (radius/angles/robot radius).
Enabled=true
Team=blue
FeedbackAddress=224.5.69.4
FeedbackPort=16941
WheelRadiusMm=26.0
RobotRadiusMm=90.0
WheelAngleFlDeg=60.0
WheelAngleBlDeg=135.0
WheelAngleBrDeg=-135.0
WheelAngleFrDeg=-60.0
; Sensor model: 0 ⇒ ideal encoder (exact body velocity). Tune for NIS/R tests.
NoiseSigmaMps=0.0
BiasMps=0.0
QuantizationMps=0.0

[Actuation]
; First-order lag τ + transport dead time on the commanded body velocity, so
; RAVEN's OC has a realistic plant to compensate. 0 ⇒ ideal passthrough.
TauLinearSec=0.0
TauAngularSec=0.0
DeadTimeLinearSec=0.0
DeadTimeAngularSec=0.0
